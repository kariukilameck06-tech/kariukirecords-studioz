<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Success</title>
<h1 style="position: fixed;padding-top: 0px;text-align:center; margin-top: -800px;">KARIUKI RECORDS STUDIOZ</h1>
<style>
  /* MOBILE RESPONSIVE FIXES */
@media (max-width: 900px) {
  /* Navigation menu stacks vertically */
  nav ul {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    margin-top: 10px;
  }

  /* Service boxes stack */
  .service-container {
    flex-direction: column;
  }
  .service-box {
    width: 100% !important;
  }

  /* Gallery images stack */
  .gallery {
    grid-template-columns: 1fr !important;
  }
  .gallery img {
    width: 100% !important;
    height: auto;
  }

  /* Hero text scaling */
  .hero h2 {
    font-size: 35px;
  }
  .hero p {
    font-size: 16px;
  }
  .hero .btn {
    padding: 10px 25px;
    font-size: 14px;
  }

  /* Form inputs full width */
  form input, form textarea {
    width: 100%;
  }

  /* Payment section cards stack */
  #studio-payment > div {
    flex-direction: column;
  }
}
  /* Full-page studio background */
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background-image: url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=3840');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    font-family: Arial, sans-serif;
    color: #fff;
    position: relative;
    overflow: hidden;
  }

  /* Dark overlay */
  body::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
  }

  /* Centered content */
  .content {
    z-index: 2;
    max-width: 600px;
  }

  h1 {
    font-size: 3rem;
    margin-bottom: 1rem;
    color: #ffd700;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
  }

  p {
    font-size: 1.5rem;
    margin-bottom: 2rem;
  }

  a {
    display: inline-block;
    padding: 0.75rem 1.5rem;
    background-color: #d4af37;
    color: #000;
    text-decoration: none;
    font-weight: bold;
    border-radius: 0.5rem;
    transition: transform 0.2s;
  }

  a:hover {
    transform: scale(1.05);
  }

  /* Confetti styles */
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background-color: #ffd700;
    opacity: 0.8;
    top: -10px;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% {
      transform: translateY(0) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(110vh) rotate(360deg);
      opacity: 0;
    }
  }
</style>
</head>
<body>
  <div class="content">
    <h1>🎉 Congratulations!</h1>
    <p>Your booking has been submitted successfully.<br>
    Thank you for choosing Kariuki Records Studioz!</p>
    <a href="index.html">Return to Home</a>
  </div>

  <!-- Confetti elements -->
  <script>
    const confettiCount = 100; // number of confetti pieces
    for (let i = 0; i < confettiCount; i++) {
      const confetti = document.createElement('div');
      confetti.classList.add('confetti');
      confetti.style.left = Math.random() * 100 + 'vw';
      confetti.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`;
      confetti.style.width = confetti.style.height = (Math.random()*8 + 4) + 'px';
      confetti.style.animationDuration = (Math.random()*3 + 2) + 's';
      confetti.style.animationDelay = Math.random() * 5 + 's';
      document.body.appendChild(confetti);
    }
  </script>
</body>
</html>
